version: "3.9"
services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      - RESNET50_WEIGHTS=/app/weights/best_resnet50.pth
      - EFFNET_WEIGHTS=/app/weights/best_efficientnet_b0.pth
      - MOBILENET_WEIGHTS=/app/weights/best_mobilenet_v3.pth
    volumes:
      - ./weights:/app/weights:ro
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    ports: ["5000:5000"]
    volumes: ["./mlruns:/mlruns"]
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns

  dashboard:
    build: .
    ports: ["8501:8501"]
    volumes: ["./monitoring:/app/monitoring"]
    command: streamlit run monitoring/dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on: [api]